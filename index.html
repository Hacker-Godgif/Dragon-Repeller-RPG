<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">    
    <title>RPG - Dragon Repeller</title>

</head>
<body>

    <div id="game">

        <div id="stats">
            <span class="stat">XP: <strong><span id="xpText">0</span></strong></span>
            <span class="stat">Health: <strong><span id="healthText">100</span></strong></span>
            <span class="stat">Gold: <strong><span id="goldText">0</span></strong></span>
        </div>

        <div id="controls">
            <button id="btn1">Go to store</button>
            <button id="btn2">Go to cave</button>
            <button id="btn3">Fight dragon</button>
        </div>

        <div id="monsterstats">
            <span class="stat">Monster Name: <strong><span id="monsterName">   </span></strong></span>
            <span class="stat">Monster Health: <strong><span id="monsterHealth">   </span></strong></span>
        </div>

        <div id="text">
            Welcome to the Dragon Repeller RPG! Your goal is to defeat the dragon and save the kingdom. You can earn XP and gold by fighting monsters in the cave, and use your gold to buy better weapons and armor in the store. Good luck, adventurer!
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
